name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-macos
            binary: agent-devtools-darwin-arm64
          - os: macos-latest
            target: x86_64-macos
            binary: agent-devtools-darwin-x64
          - os: ubuntu-latest
            target: x86_64-linux-gnu
            binary: agent-devtools-linux-x64
          - os: ubuntu-latest
            target: aarch64-linux-gnu
            binary: agent-devtools-linux-arm64
          - os: ubuntu-latest
            target: x86_64-windows
            binary: agent-devtools-win32-x64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
      - name: Build
        run: zig build -Dtarget=${{ matrix.target }} -Doptimize=ReleaseSafe
      - name: Rename binary
        shell: bash
        run: |
          if [ "${{ matrix.target }}" = "x86_64-windows" ]; then
            cp zig-out/bin/agent-devtools.exe ${{ matrix.binary }}
          else
            cp zig-out/bin/agent-devtools ${{ matrix.binary }}
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: ${{ matrix.binary }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f -exec cp {} release/ \;
          ls -la release/
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
